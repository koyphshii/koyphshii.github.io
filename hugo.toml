baseURL = "https://lanaceryasser.github.io/"
title = "Koyphshi"
locale = "en"
defaultContentLanguage = "en"
theme = "FeelIt"

enableGitInfo = false
enableEmoji = true
enableRobotsTXT = true

[pagination]
  pagerSize = 6

[caches]
  [caches.images]
    dir = ":resourceDir/_gen"
    maxAge = "24h"

[params]
  version = "1.0.X"
  description = "Koyphshi - My Personal Blog"
  keywords = ["blog", "tech", "programming", "development"]
  defaultTheme = "dark"
  avatar = "avatar.gif"
  fingerprint = ""
  dateFormat = "2006-01-02"
  images = ["/avatar/avatar.gif"]

  [params.header]
    desktopMode = "sticky"
    mobileMode = "auto"
    [params.header.title]
      logo = ""
      name = "Koyphshi"
      pre = ""
      post = ""
      typeit = false

  [params.footer]
    enable = true
    custom = ""
    hugo = true
    copyright = true
    author = true
    since = 2024

  [params.home]
    rss = 10
    [params.home.profile]
      enable = false
      avatarURL = "/avatar/avatar.gif"
      title = "Koyphshi"
      subtitle = "have fun :3"
      typeit = true
      social = true
      disclaimer = ""
    [params.home.posts]
      enable = true
      paginate = 6
      defaultHiddenFromHomePage = false

  [params.social]
    GitHub = "koyphshii"
    LinkedIn = "yasser-lanacer-1903442a8"
    Twitter = ""
    Email = ""
    RSS = true

  [params.page]
    hiddenFromHomePage = false
    hiddenFromSearch = false
    twemoji = false
    lightgallery = false
    ruby = true
    fraction = true
    fontawesome = true
    linkToMarkdown = true
    rssFullText = false
    [params.page.toc]
      enable = true
      keepStatic = false
      auto = true
    [params.page.math]
      enable = true
      blockLeftDelimiter = ""
      blockRightDelimiter = ""
      inlineLeftDelimiter = ""
      inlineRightDelimiter = ""
      copyTex = true
      mhchem = true
    [params.page.code]
      copy = true
      maxShownLines = 20
    [params.page.share]
      enable = true
      Facebook = true
      Linkedin = true
    [params.page.comment]
      enable = false
    [params.page.library]
      [params.page.library.css]
        custom = "/css/custom.css"

  [params.seo]
    image = "/avatar/avatar.gif"
    thumbnailUrl = "/avatar/avatar.gif"

  [params.analytics]
    enable = false
    [params.analytics.google]
      id = ""

  [params.search]
    enable = true
    type = "lunr"
    contentLength = 4000
    placeholder = ""
    maxResultLength = 10
    snippetLength = 30
    highlightTag = "em"
    absoluteURL = false
    [params.search.algolia]
      index = ""
      appID = ""
      searchKey = ""

  # Fix for .Site.Author error — theme reads author from here
  [params.author]
    name = "Koyphshi"
    email = ""
    link = ""

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 1
  [[menu.main]]
    identifier = "categories"
    name = "Categories"
    url = "/categories/"
    weight = 2
  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 3
  [[menu.main]]
    identifier = "ethernaut"
    name = "Ethernaut"
    url = "/posts/ethernaut/"
    weight = 4
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 5

[markup]
  [markup.highlight]
    noClasses = false
    lineNos = true
    lineNumbersInTable = true
    style = "monokai"
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 6

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5

[Permalinks]
  posts = "/posts/:contentbasename/"

[privacy]
  [privacy.x]
    enableDNT = true
  [privacy.youtube]
    privacyEnhanced = true

[outputs]
  home = ["HTML", "RSS", "JSON"]
